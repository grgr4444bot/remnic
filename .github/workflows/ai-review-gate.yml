name: AI Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created]
  check_run:
    types: [completed]

permissions:
  contents: read
  checks: read
  issues: read
  pull-requests: read

jobs:
  ai-reviewers:
    if: >-
      (github.event_name == 'check_run' && github.event.check_run.app.slug != 'github-actions') ||
      (github.event_name != 'check_run' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for AI reviewers on push events
        if: github.event_name == 'pull_request'
        run: |
          echo "Waiting 3 minutes for AI reviewers to analyse the diff..."
          sleep 180

      - name: Check AI review bot activity
        uses: actions/github-script@v7
        env:
          REQUIRED_AI_REVIEWER_GROUPS: >-
            kilo-code-bot[bot]|kilo-code-bot|kiloconnect[bot]|kilo[bot]|kiloconnect|kilo,
            codex[bot]|openai-codex[bot]|codex-reviewer[bot]|chatgpt-codex-connector|chatgpt-codex-connector[bot],
            cursor-bugbot[bot]|cursor[bot]|cursor-bugbot|cursor
        with:
          script: |
            const BAD_CHECK_CONCLUSIONS = new Set([
              'action_required',
              'cancelled',
              'failure',
              'skipped',
              'stale',
              'startup_failure',
              'timed_out',
            ]);
            const POSITIVE_CHECK_CONCLUSIONS = new Set(['success', 'neutral']);
            const NEGATIVE_REVIEW_STATES = new Set(['CHANGES_REQUESTED']);
            const NEGATIVE_VERDICT_PATTERN =
              /\b(?:changes\s+requested|do\s+not\s+merge|fail(?:ed|ing|ure)?|block(?:ed|ing|er)?|reject(?:ed|ing)?|(?:not|no|never|cannot|can['’]?t|isn['’]?t)\s+(?:a\s+)?(?:pass|approved|lgtm))\b/i;
            const POSITIVE_VERDICT_PATTERN = /\b(?:PASS|APPROVED|LGTM)\b/i;

            function normalizeLogin(value) {
              return typeof value === 'string' ? value.trim().toLowerCase() : '';
            }

            function bodyHasPositiveVerdict(body) {
              if (typeof body !== 'string') return false;
              return !NEGATIVE_VERDICT_PATTERN.test(body) && POSITIVE_VERDICT_PATTERN.test(body);
            }

            function checkRunTime(checkRun) {
              const parsed = Date.parse(
                checkRun.completed_at ??
                  checkRun.updated_at ??
                  checkRun.started_at ??
                  checkRun.created_at ??
                  '',
              );
              return Number.isFinite(parsed) ? parsed : 0;
            }

            function activityTime(activity) {
              const parsed = Date.parse(
                activity.submitted_at ??
                  activity.created_at ??
                  activity.updated_at ??
                  '',
              );
              return Number.isFinite(parsed) ? parsed : 0;
            }

            function isCurrentActivity(activity, headSha, headCommittedAt) {
              const shortSha = headSha?.slice(0, 7);
              const body = typeof activity.body === 'string' ? activity.body : '';
              if (headSha && (body.includes(headSha) || (shortSha && body.includes(shortSha)))) {
                return true;
              }
              if (activity.commit_id && headSha) {
                return activity.commit_id === headSha;
              }
              if (activity.original_commit_id && headSha) {
                return activity.original_commit_id === headSha;
              }
              const parsedActivityTime = Date.parse(activity.submitted_at ?? activity.created_at ?? '');
              const parsedHeadTime = Date.parse(headCommittedAt ?? '');
              return Number.isFinite(parsedActivityTime) &&
                Number.isFinite(parsedHeadTime) &&
                parsedActivityTime >= parsedHeadTime;
            }

            function isCurrentCheckRun(checkRun, headSha, headCommittedAt) {
              const checkHeadSha = checkRun.head_sha ?? checkRun.headSha;
              if (headSha && typeof checkHeadSha === 'string' && checkHeadSha.trim()) {
                return checkHeadSha === headSha;
              }
              const checkTime = Date.parse(
                checkRun.completed_at ??
                  checkRun.updated_at ??
                  checkRun.started_at ??
                  checkRun.created_at ??
                  '',
              );
              const headTime = Date.parse(headCommittedAt ?? '');
              return Number.isFinite(checkTime) &&
                Number.isFinite(headTime) &&
                checkTime >= headTime;
            }

            function parseReviewerGroups(raw) {
              return String(raw ?? '')
                .split(',')
                .map((group) =>
                  group
                    .split('|')
                    .map(normalizeLogin)
                    .filter(Boolean),
                )
                .filter((group) => group.length > 0);
            }

            function evaluateAiReviewGate({
              groups,
              headSha,
              headCommittedAt,
              reviews = [],
              issueComments = [],
              reviewComments = [],
              checkRuns = [],
            }) {
              if (!Array.isArray(groups) || groups.length === 0) {
                return {
                  ok: false,
                  reason: 'No required AI reviewer groups configured.',
                  present: [],
                  missing: [],
                  blockers: [],
                };
              }

              const positiveByAlias = new Map();
              const blockers = [];
              const configuredAliases = new Set(groups.flat());

              const latestReviews = new Map();
              for (const review of reviews) {
                const login = normalizeLogin(review.user?.login);
                if (!login || !configuredAliases.has(login)) continue;
                if (!isCurrentActivity(review, headSha, headCommittedAt)) continue;
                const previous = latestReviews.get(login);
                if (!previous || activityTime(review) >= activityTime(previous)) {
                  latestReviews.set(login, review);
                }
              }

              for (const [login, review] of latestReviews) {
                if (review.state === 'APPROVED') {
                  positiveByAlias.set(login, { alias: login, kind: 'review', state: review.state });
                  continue;
                }
                if (NEGATIVE_REVIEW_STATES.has(review.state)) {
                  blockers.push({ alias: login, kind: 'review', state: review.state });
                }
              }

              for (const comment of [...issueComments, ...reviewComments]) {
                const login = normalizeLogin(comment.user?.login);
                if (!login || !bodyHasPositiveVerdict(comment.body)) continue;
                if (!isCurrentActivity(comment, headSha, headCommittedAt)) continue;
                positiveByAlias.set(login, { alias: login, kind: 'comment', state: 'POSITIVE_COMMENT' });
              }

              const latestCheckRuns = new Map();
              for (const checkRun of checkRuns) {
                if (!isCurrentCheckRun(checkRun, headSha, headCommittedAt)) continue;
                const checkName = normalizeLogin(checkRun.name) || 'unnamed-check';
                const aliases = [checkRun.app?.slug, checkRun.app?.name]
                  .map(normalizeLogin)
                  .filter((alias) => alias && configuredAliases.has(alias));
                for (const alias of aliases) {
                  const key = `${alias}\0${checkName}`;
                  const previous = latestCheckRuns.get(key);
                  if (!previous || checkRunTime(checkRun) >= checkRunTime(previous)) {
                    latestCheckRuns.set(key, { ...checkRun, alias });
                  }
                }
              }

              for (const checkRun of latestCheckRuns.values()) {
                const conclusion = normalizeLogin(checkRun.conclusion);
                const alias = checkRun.alias;
                if (BAD_CHECK_CONCLUSIONS.has(conclusion)) {
                  blockers.push({ alias, kind: 'check_run', state: conclusion || 'unknown' });
                } else if (POSITIVE_CHECK_CONCLUSIONS.has(conclusion)) {
                  positiveByAlias.set(alias, { alias, kind: 'check_run', state: conclusion });
                }
              }

              const present = [];
              const missing = [];
              for (const group of groups) {
                const matchedAlias = group.find((alias) => positiveByAlias.has(alias));
                if (matchedAlias) {
                  present.push({ group, ...positiveByAlias.get(matchedAlias) });
                } else {
                  missing.push(group);
                }
              }

              if (blockers.length > 0) {
                return {
                  ok: false,
                  reason: `AI reviewer check run failed or was not positive: ${blockers.map((b) => `${b.alias}(${b.state})`).join(', ')}`,
                  present,
                  missing,
                  blockers,
                };
              }

              if (missing.length > 0) {
                return {
                  ok: false,
                  reason: `Missing required positive AI review groups: ${missing.map((group) => group.join(' OR ')).join('; ')}`,
                  present,
                  missing,
                  blockers,
                };
              }

              return {
                ok: true,
                reason: 'AI review gate satisfied.',
                present,
                missing,
                blockers,
              };
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const pr =
              context.payload.pull_request?.number ??
              context.payload.check_run?.pull_requests?.[0]?.number;
            if (!pr) {
              if (context.eventName === 'check_run') {
                core.notice('Skipping check_run event with no associated pull request.');
                return;
              }
              core.setFailed('Unable to determine pull request number.');
              return;
            }

            const groupsRaw = process.env.REQUIRED_AI_REVIEWER_GROUPS || '';
            const groups = parseReviewerGroups(groupsRaw);

            if (groups.length === 0) {
              core.setFailed('No required AI reviewer groups configured.');
              return;
            }

            const pullRequest = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: Number(pr),
            });
            if (pullRequest.data.draft) {
              core.notice('Skipping draft pull request.');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: Number(pr),
              per_page: 100,
            });

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: Number(pr),
              per_page: 100,
            });

            const prComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: Number(pr),
              per_page: 100,
            });

            const headSha = pullRequest.data.head.sha;
            const headCommit = headSha
              ? await github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: headSha,
                })
              : null;
            const headCommittedAt =
              headCommit?.data?.commit?.committer?.date ??
              headCommit?.data?.commit?.author?.date ??
              null;
            const checkRuns = headSha
              ? await github.paginate(github.rest.checks.listForRef, {
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                })
              : [];

            const result = evaluateAiReviewGate({
              groups,
              headSha,
              headCommittedAt,
              reviews,
              issueComments,
              reviewComments: prComments,
              checkRuns,
            });

            core.info(
              `Positive current-head AI review activity from: ${
                result.present.map(p => `${p.alias}(${p.kind}:${p.state})`).join(', ') || 'none'
              }`,
            );

            if (result.blockers.length > 0) {
              core.info(
                `Blocking AI review activity: ${
                  result.blockers.map(b => `${b.alias}(${b.state})`).join(', ')
                }`,
              );
            }

            if (!result.ok) {
              core.setFailed(result.reason);
              return;
            }

            core.notice(result.reason);
